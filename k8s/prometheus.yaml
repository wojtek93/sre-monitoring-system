apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sre-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - /etc/prometheus/alert.rules.yml

    scrape_configs:
      - job_name: 'sre-demo'
        static_configs:
          - targets: ['sre-demo-service.sre-demo.svc.cluster.local:80']

  alert.rules.yml: |
    groups:
      - name: sre-demo-alerts
        rules:
          - alert: HighErrorRate
            expr: http_requests_total{path="/error",status="500"} > 10
            for: 10s
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected in sre-demo"
              description: "More than 2 HTTP 500 responses on /error within the last minute"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sre-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sre-demo
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP